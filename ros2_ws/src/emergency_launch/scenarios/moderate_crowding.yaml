# Scenario: moderate_crowding
# 4 moving humans; doorway crossings increase the chance of replan.
scenario: moderate_crowding
world_file: hospital_moderate_crowding.sdf
dynamic_event_count: 4
actor_count: 4

planner_grid:
  width: 16
  height: 14
  start: [2, 2]
  obstacles:
    - [0, 8]
    - [1, 8]
    - [2, 8]
    - [3, 8]
    - [6, 8]
    - [7, 8]
    - [8, 8]
    - [9, 8]
    - [10, 8]
    - [11, 8]
    - [14, 8]
    - [15, 8]
    - [8, 9]
    - [8, 10]
    - [8, 11]
    - [8, 12]
    - [8, 13]
    - [3, 10]
    - [3, 11]
    - [4, 10]
    - [4, 11]
    - [5, 10]
    - [5, 11]
    - [11, 10]
    - [11, 11]
    - [12, 10]
    - [12, 11]
    - [13, 10]
    - [13, 11]

patient_locations:
  - name: patient_a
    x: 4
    y: 9
    severity: high
  - name: patient_b
    x: 12
    y: 9
    severity: high

# Moving humans, driven in software by human_obstacles_node (Gazebo does not
# broadcast scripted-actor poses). Coordinates are grid cells; each waypoint is
# [time_s, x, y] and the trajectory loops over the final timestamp.
# All humans walk at the same ~0.4 m/s across every scenario, so crowding differs
# ONLY by the number of people (not their speed). This keeps difficulty monotonic
# in crowding. (Times are normalized by distance, so they no longer match the
# faster <actor> animation timings in the .sdf; that only affects GUI visuals.)
humans:
  - waypoints: [[0.0, 2.0, 5.0], [30.0, 14.0, 5.0], [60.0, 2.0, 5.0]]
  - waypoints: [[0.0, 13.0, 7.0], [20.0, 5.0, 7.0], [40.0, 13.0, 7.0]]
  - waypoints: [[0.0, 5.0, 4.0], [8.75, 5.0, 7.5], [17.5, 5.0, 4.0]]
  - waypoints: [[0.0, 11.0, 4.0], [8.75, 11.0, 7.5], [17.5, 11.0, 4.0]]
