# Scenario: high_crowding
# 7 moving humans; frequent corridor crossings -> highest replan rate.
scenario: high_crowding
world_file: hospital_high_crowding.sdf
dynamic_event_count: 7
actor_count: 7

planner_grid:
  width: 16
  height: 14
  start: [2, 2]
  obstacles:
    - [0, 8]
    - [1, 8]
    - [2, 8]
    - [3, 8]
    - [6, 8]
    - [7, 8]
    - [8, 8]
    - [9, 8]
    - [10, 8]
    - [11, 8]
    - [14, 8]
    - [15, 8]
    - [8, 9]
    - [8, 10]
    - [8, 11]
    - [8, 12]
    - [8, 13]
    - [3, 10]
    - [3, 11]
    - [4, 10]
    - [4, 11]
    - [5, 10]
    - [5, 11]
    - [11, 10]
    - [11, 11]
    - [12, 10]
    - [12, 11]
    - [13, 10]
    - [13, 11]

patient_locations:
  - name: patient_a
    x: 4
    y: 9
    severity: high
  - name: patient_b
    x: 12
    y: 9
    severity: high

# Moving humans, driven in software by human_obstacles_node (Gazebo does not
# broadcast scripted-actor poses). Coordinates are grid cells; each waypoint is
# [time_s, x, y] and the trajectory loops over the final timestamp. These mirror
# the <actor> trajectories in hospital_high_crowding.sdf.
humans:
  - waypoints: [[0.0, 2.0, 5.0], [15.0, 14.0, 5.0], [30.0, 2.0, 5.0]]
  - waypoints: [[0.0, 13.0, 7.0], [10.0, 5.0, 7.0], [20.0, 13.0, 7.0]]
  - waypoints: [[0.0, 5.0, 4.0], [4.375, 5.0, 7.5], [8.75, 5.0, 4.0]]
  - waypoints: [[0.0, 11.0, 4.0], [4.375, 11.0, 7.5], [8.75, 11.0, 4.0]]
  - waypoints: [[0.0, 14.0, 4.0], [4.375, 14.0, 7.5], [8.75, 14.0, 4.0]]
  - waypoints: [[0.0, 8.0, 6.0], [5.0, 12.0, 6.0], [10.0, 8.0, 6.0]]
  - waypoints: [[0.0, 12.0, 5.0], [7.906, 6.0, 7.0], [15.811, 12.0, 5.0]]
